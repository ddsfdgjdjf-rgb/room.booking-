<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حجز غرف الاجتماعات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 نظام حجز غرف الاجتماعات</h1>
            <div id="adminPanel">
                <button id="adminLoginBtn" onclick="showAdminLogin()">🔐 دخول الأدمن</button>
                <button id="adminLogoutBtn" onclick="logoutAdmin()" style="display:none;">🚪 خروج</button>
            </div>
        </header>

        <!-- لوحة الأدمن -->
        <div id="adminDashboard" style="display:none;">
            <h2>🛠 لوحة تحكم الأدمن</h2>
            <div class="admin-actions">
                <div class="form-group">
                    <h3>إضافة غرفة جديدة</h3>
                    <input type="text" id="roomName" placeholder="اسم الغرفة">
                    <input type="number" id="roomCapacity" placeholder="السعة">
                    <button onclick="addRoom()">➕ إضافة غرفة</button>
                </div>
                <div class="form-group">
                    <h3>إدارة الحجوزات</h3>
                    <button onclick="viewAllBookings()">📋 عرض كل الحجوزات</button>
                    <button onclick="cancelBooking()">❌ إلغاء حجز</button>
                </div>
            </div>
        </div>

        <!-- عرض الغرف -->
        <div id="roomsContainer">
            <!-- سيتم عرض الغرف هنا ديناميكياً -->
        </div>

        <!-- نموذج الحجز -->
        <div id="bookingModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>حجز غرفة</h2>
                <form id="bookingForm">
                    <input type="hidden" id="roomId">
                    <div class="form-group">
                        <label>اسم الحاجز:</label>
                        <input type="text" id="bookerName" required>
                    </div>
                    <div class="form-group">
                        <label>التاريخ:</label>
                        <input type="date" id="bookingDate" required>
                    </div>
                    <div class="form-group">
                        <label>من الساعة:</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label>إلى الساعة:</label>
                        <input type="time" id="endTime" required>
                    </div>
                    <button type="submit">✅ تأكيد الحجز</button>
                </form>
            </div>
        </div>

        <!-- عرض الحجوزات -->
        <div id="bookingsModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="closeBookingsModal()">&times;</span>
                <h2>📋 قائمة الحجوزات</h2>
                <div id="bookingsList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
