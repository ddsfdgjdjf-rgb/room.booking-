<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حجز غرف الاجتماعات</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .available { background: #dcfce7; color: var(--success); }
        .booked { background: #fee2e2; color: var(--danger); }
        
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); }
        
        .admin-section {
            background: #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            margin-top: 4px;
        }
        .hidden { display: none; }
        .info-text { font-size: 0.85rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📅 نظام حجز غرف الاجتماعات</h1>
        <p>يتم إلغاء الحجز تلقائياً إذا تأخر الحضور لأكثر من 15 دقيقة.</p>
    </header>

    <!-- عرض الغرف -->
    <div class="grid" id="roomsContainer"></div>

    <!-- نموذج الحجز -->
    <div class="card" style="max-width: 500px; margin: 0 auto 30px auto;">
        <h3>📝 حجز غرفة جديدة</h3>
        <form id="bookingForm">
            <label>اختر الغرفة:</label>
            <select id="roomSelect" required>
                <option value="1">الغرفة الأولى (A)</option>
                <option value="2">الغرفة الثانية (B)</option>
                <option value="3">الغرفة الثالثة (C)</option>
            </select>

            <label>اسم المحجز:</label>
            <input type="text" id="userBox" placeholder="مثال: أحمد محمد" required>

            <label>وقت بدء الاجتماع:</label>
            <input type="time" id="timeBox" required>

            <button type="submit">تأكيد الحجز</button>
        </form>
    </div>

    <!-- قسم الإدارة -->
    <div class="admin-section">
        <div id="adminLogin">
            <h3>🔒 لوحة التحكم (خاص بالمسؤول)</h3>
            <input type="password" id="adminPass" placeholder="أدخل الرمز السري">
            <button onclick="loginAdmin()">دخول</button>
        </div>
        
        <div id="adminPanel" class="hidden">
            <h3>🛠️ إدارة الحجوزات الحالية</h3>
            <div id="adminActions"></div>
            <button class="btn-danger" onclick="logoutAdmin()" style="margin-top: 15px;">تسجيل خروج</button>
        </div>
    </div>
</div>

<script>
    // البيانات الأساسية للغرف (تُخزن في المتصفح LocalStorage)
    let rooms = JSON.parse(localStorage.getItem('meeting_rooms')) || [
        { id: 1, name: "الغرفة الأولى (A)", status: "متاحة", user: "", time: "" },
        { id: 2, name: "الغرفة الثانية (B)", status: "متاحة", user: "", time: "" },
        { id: 3, name: "الغرفة الثالثة (C)", status: "متاحة", user: "", time: "" }
    ];

    // تحديث الشاشة وتعريف النظام
    function updateUI() {
        localStorage.setItem('meeting_rooms', JSON.stringify(rooms));
        checkLateBookings(); // فحص التأخير تلقائياً عند كل تحديث

        // تحديث واجهة المستخدم
        const container = document.getElementById('roomsContainer');
        container.innerHTML = '';
        
        rooms.forEach(room => {
            const isBooked = room.status === "محجوزة";
            container.innerHTML += `
                <div class="card">
                    <h2>${room.name}</h2>
                    <span class="status ${isBooked ? 'booked' : 'available'}">${room.status}</span>
                    ${isBooked ? `
                        <p><strong>المحجوز باسم:</strong> ${room.user}</p>
                        <p><strong>التوقيت:</strong> ${room.time}</p>
                        <p class="info-text">⚠️ يلغى تلقائياً في حال عدم الحضور خلال 15 دقيقة.</p>
                    ` : '<p>الغرفة شاغرة ومتاحة للحجز الآن.</p>'}
                </div>
            `;
        });

        // تحديث لوحة الأدمن
        renderAdminPanel();
    }

    // فحص التأخير وإلغاء الحجز تلقائياً (15 دقيقة)
    function checkLateBookings() {
        const now = new Date();
        const currentHours = now.getHours();
        const currentMinutes = now.getMinutes();

        rooms.forEach(room => {
            if (room.status === "محجوزة" && room.time) {
                const [bookHours, bookMinutes] = room.time.split(':').map(Number);
                
                // تحويل الوقت لدقائق للمقارنة السهلة
                const nowInMinutes = currentHours * 60 + currentMinutes;
                const bookInMinutes = bookHours * 60 + bookMinutes;

                // إذا مر أكثر من 15 دقيقة على موعد الحجز
                if (nowInMinutes - bookInMinutes >= 15) {
                    room.status = "متاحة";
                    room.user = "";
                    room.time = "";
                }
            }
        });
    }

    // معالجة فورمة الحجز
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const roomId = document.getElementById('roomSelect').value;
        const user = document.getElementById('userBox').value;
        const time = document.getElementById('timeBox').value;

        const room = rooms.find(r => r.id == roomId);
        if (room.status === "محجوزة") {
            alert("عذراً، هذه الغرفة محجوزة بالفعل في هذا الوقت!");
            return;
        }

        room.status = "محجوزة";
        room.user = user;
        room.time = time;

        alert(`تم حجز ${room.name} بنجاح في تمام الساعة ${time}`);
        this.reset();
        updateUI();
    });

    // تسجيل دخول الأدمن
    function loginAdmin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "1234") {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert("الرمز السري غير صحيح!");
        }
    }

    function logoutAdmin() {
        document.getElementById('adminPass').value = '';
        document.getElementById('adminLogin').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
    }

    // بناء لوحة التحكم للأدمن إلغاء يدوي / تأكيد حضور
    function renderAdminPanel() {
        const adminActions = document.getElementById('adminActions');
        adminActions.innerHTML = '';
        
        let hasBookings = false;
        rooms.forEach(room => {
            if (room.status === "محجوزة") {
                hasBookings = true;
                adminActions.innerHTML += `
                    <div style="border-bottom: 1px solid #cbd5e1; padding: 10px 0;">
                        <strong>${room.name}</strong> - محجوزة لـ (${room.user}) الساعة ${room.time}
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <button onclick="clearRoom(${room.id})" class="btn-danger" style="padding:5px;">إلغاء الحجز الفوري</button>
                            <button onclick="confirmAttendance(${room.id})" style="background:var(--success); padding:5px;">تأكيد الحضور (إيقاف المؤقت)</button>
                        </div>
                    </div>
                `;
            }
        });

        if (!hasBookings) {
            adminActions.innerHTML = '<p>لا توجد حجوزات نشطة حالياً لإدارتها.</p>';
        }
    }

    // إلغاء الحجز من الأدمن
    function clearRoom(id) {
        const room = rooms.find(r => r.id == id);
        room.status = "متاحة";
        room.user = "";
        room.time = "";
        updateUI();
    }

    // تأكيد الحضور (يثبت الحجز ولا يجعله عرضة للإلغاء التلقائي)
    function confirmAttendance(id) {
        const room = rooms.find(r => r.id == id);
        room.time = ""; // مسح التوقيت يوقف شرط الـ 15 دقيقة تلقائياً كأنهم حضروا
        alert("تم تأكيد حضور الأعضاء وتثبيت الغرفة بنجاح.");
        updateUI();
    }

    // تشغيل فحص دوري كل دقيقة للتأكد من إلغاء المتأخرين تلقائياً حتى لو الصفحة مفتوحة
    setInterval(updateUI, 60000);

    // تشغيل أول مرة عند فتح الصفحة
    updateUI();
</script>

</body>
</html>
