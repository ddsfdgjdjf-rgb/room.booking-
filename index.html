<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز غرف الاجتماعات</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .status { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .available { background: #dcfce7; color: var(--success); }
        .booked { background: #fee2e2; color: var(--danger); }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .nav-link { text-align: center; display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📅 نظام حجز غرف الاجتماعات</h1>
        <p>اختر غرفة وقم بتسجيل حجزك (يُلغى الحجز تلقائياً عند التأخر 15 دقيقة)</p>
    </header>

    <!-- عرض حالة الغرف للمستخدمين -->
    <div class="grid" id="roomsContainer"></div>

    <!-- نموذج التسجيل والحجز -->
    <div class="card" style="max-width: 450px; margin: 0 auto;">
        <h3>📝 تسجيل حجز جديد</h3>
        <form id="bookingForm">
            <label>اختر الغرفة:</label>
            <select id="roomSelect" required>
                <option value="1">الغرفة الأولى (A)</option>
                <option value="2">الغرفة الثانية (B)</option>
                <option value="3">الغرفة الثالثة (C)</option>
            </select>

            <label>اسم المحجز / الجهة:</label>
            <input type="text" id="userBox" placeholder="مثال: المهندس أحمد" required>

            <label>وقت بدء الاجتماع:</label>
            <input type="time" id="timeBox" required>

            <button type="submit">تأكيد وتسجيل الحجز</button>
        </form>
    </div>

    <a href="admin.html" class="nav-link">🔒 الدخول إلى لوحة الإدارة</a>
</div>

<script>
    // جلب البيانات أو تعيين الغرف الثلاث الافتراضية
    let rooms = JSON.parse(localStorage.getItem('meeting_rooms')) || [
        { id: 1, name: "الغرفة الأولى (A)", status: "متاحة", user: "", time: "" },
        { id: 2, name: "الغرفة الثانية (B)", status: "متاحة", user: "", time: "" },
        { id: 3, name: "الغرفة الثالثة (C)", status: "متاحة", user: "", time: "" }
    ];

    function updateUI() {
        localStorage.setItem('meeting_rooms', JSON.stringify(rooms));
        checkLateBookings();

        const container = document.getElementById('roomsContainer');
        container.innerHTML = '';
        
        rooms.forEach(room => {
            const isBooked = room.status === "محجوزة";
            container.innerHTML += `
                <div class="card">
                    <h3>${room.name}</h3>
                    <span class="status ${isBooked ? 'booked' : 'available'}">${room.status}</span>
                    ${isBooked ? `<p><strong>باسم:</strong> ${room.user}</p><p><strong>الساعة:</strong> ${room.time}</p>` : '<p>متاحة للحجز الآن.</p>'}
                </div>
            `;
        });
    }

    // شرط إلغاء الحجز عند التأخير الفوري لـ 15 دقيقة
    function checkLateBookings() {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        rooms.forEach(room => {
            if (room.status === "محجوزة" && room.time) {
                const [h, m] = room.time.split(':').map(Number);
                const bookMinutes = h * 60 + m;

                if (currentMinutes - bookMinutes >= 15) {
                    room.status = "متاحة";
                    room.user = "";
                    room.time = "";
                }
            }
        });
    }

    // معالجة فورم الحجز
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const roomId = document.getElementById('roomSelect').value;
        const user = document.getElementById('userBox').value;
        const time = document.getElementById('timeBox').value;

        const room = rooms.find(r => r.id == roomId);
        if (room.status === "محجوزة") {
            alert("عذراً، هذه الغرفة محجوزة حالياً!");
            return;
        }

        room.status = "محجوزة";
        room.user = user;
        room.time = time;

        alert(`تم تسجيل حجز ${room.name} بنجاح الساعة ${time}`);
        this.reset();
        updateUI();
    });

    // تحديث مستمر تلقائي كل دقيقة لفحص المتأخرين
    setInterval(updateUI, 60000);
    updateUI();
</script>
</body>
</html>
